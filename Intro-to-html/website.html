<!DOCTYPE html>
<html>
    <head>
     <style>

        .p1{
            font-size: 30px;
            font-family: Arial;
            font-weight: 500px  ;
            font-size: 30px;
        }
       
        .input1, .input2 {
            display: block;
            margin-bottom: 15px;
            padding: 10px 120px;
            border-width: 0.1px;
            background-color: rgb(211, 211, 211);
            border: none;
            text-align: left;
            padding-left: 10px;
        }

        .btn1,.btn2{
         padding: 10px 20px;  
         margin-right: 15px;
         border: none;
        }

        .btn1{
         background-color: black;
         color: white;
        }

        .btn2{
            color: black;
        }

     </style>
    </head>
    <body>
        
    <p class="p1">
        Request a ride now.
    </p>

    <input placeholder="Enter pickup location" class="input1"> 
    <input placeholder="Enter destination" class="input2">
    <button class="btn1">
        Request now
    </button>
    <button class="btn2">
        Schedule for later
    </button>
    </body>
</html>
