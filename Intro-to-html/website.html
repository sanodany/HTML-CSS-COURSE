<!DOCTYPE html>
<html>
    <head>
     <style>
     
     .container{
       border-radius: 10px;
       border-width: 1px;
       border-style: solid;
       border-color: lightgrey;
       width: 400px;
       padding: 10px;
       box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.2);
     }

     .pic1{
       border-radius: 50%;
       width:   50px;
       height: 50px;
       object-fit: cover;
       object-position: center;
       vertical-align: middle;
     }
        .txt1{
        font-size: 14px;
        font-family: Arial, Helvetica, sans-serif;
        color: grey;
        display: inline-block;
        margin-left: 10px;
        vertical-align: middle;
        margin-right: 150px;
        }

        .btn1{
            background-color: rgba(0, 157, 255, 0.849);
            color: white;
            border-radius: 20px;
            border: none;
            padding: 5px 10px;
        }
     </style>
    </head>
    <body>
    <div class="container">


      <img src="pexels-photo-32119894.webp" class="pic1">

      <p class="txt1">
        What's happening?
      </p>

      <button class="btn1">
        Tweet
      </button>
    </div>
    
    </body>
</html>
