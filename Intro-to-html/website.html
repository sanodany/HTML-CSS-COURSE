<!DOCTYPE html>
<html>
    <head>
     <style>
      .input1 , .input2 {
          padding: 10px 3px;
          text-align: left;
          padding-left: 10px;
          border-radius: 10px;
          margin-bottom: 10px;
          border-width: 1px;
      }

        .input3 {
            display: block;
            padding: 10px 180px;
            padding-left: 10px;
            border-radius: 10px;
            border-width: 1px;
            margin-bottom: 10px;
        }
    

        .btn1 {
            background-color:rgb(0, 119, 255);
            color: white;
            padding: 10px 150px;
            border-radius: 10px;
            border-width: 1px;
            font-weight: bold;
        }
     </style>
    </head>
    <body>
        
        <input placeholder="First name" class="input1">
        <input placeholder="Last name" class="input2">
        <input placeholder="Email" class="input3">
        <button class="btn1">Sign Up</button>
    </body>
</html>
