<!DOCTYPE html>
<html>
<head>
    <style>
      
      .btn1{
        color:white;
        background-color: black;
        padding: 10px 20px;
        cursor: pointer;
        outline: none;
        border: none;
        transition: background-color 0.12s ease, color 0.3s ease;
      }

      .btn2{
        color: black;
        background-color: rgb(237, 188, 27);
        padding: 10px 40px;
        border-radius: 20px;
        border: none;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
      }

      .btn3{
        color: white;
        background-color: green;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        font-weight: bold; 
        cursor: pointer;
      }

    

      .btn1:active{
        background-color: white;
        color:black;
      }
     .btn2:hover{
        background-color:rgb(237, 160, 27); 
    }
    .btn3:hover{
      box-shadow: 3px 3px 5px 0.5px rgba(0, 0, 0, 0.5);    
    }
    </style>    
</head>
<body>

    <button class="btn1">
        Request now
    </button>

    <button class="btn2">
        Add to cart
    </button>

    <button class="btn3">
        Sign up
    </button>


    <script>

    </script>
</body>
</html>
